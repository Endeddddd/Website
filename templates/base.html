<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NeuroTech</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter', sans-serif;
            background:#0B0F1A;
            color:#D6D9E0;
        }

        a{
            text-decoration:none;
            color:white;
        }

        .navbar{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            z-index:1000;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 50px;

            background:rgba(15,27,61,0.92);
            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(92,225,230,0.2);
        }

        .logo{
            font-size:30px;
            font-family:'Orbitron', sans-serif;
            color:#6C63FF;
            text-shadow:0 0 15px #6C63FF;
        }

        .nav-links{
            display:flex;
            gap:25px;
            align-items:center;
        }

        .nav-links a{
            transition:0.3s;
            font-weight:500;
        }

        .nav-links a:hover{
            color:#5CE1E6;
            text-shadow:0 0 10px #5CE1E6;
        }

        .btn{
            display:inline-block;
            background:linear-gradient(135deg,#6C63FF,#5CE1E6);
            color:white;
            padding:10px 18px;
            border-radius:12px;
            font-weight:600;
        }

        /* DROPDOWN */
        .dropdown{
            position:relative;
        }

        .dropdown-content{
            display:none;
            position:absolute;
            top:100%;
            left:0;

            background:#0F1B3D;
            border:1px solid rgba(92,225,230,0.2);
            min-width:200px;
            border-radius:12px;
            padding:10px;

            z-index:9999;
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }

        .dropdown-content a{
            display:block;
            padding:8px;
        }

        .dropdown-content a:hover{
            background:rgba(92,225,230,0.1);
        }

        /* AVATAR */
        .nav-avatar{
            width:40px;
            height:40px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #5CE1E6;
            box-shadow:0 0 15px rgba(92,225,230,0.4);
        }

        .avatar-fallback{
            width:40px;
            height:40px;
            border-radius:50%;
            background:#1A1230;
            display:flex;
            align-items:center;
            justify-content:center;
            border:2px solid #5CE1E6;
            font-size:18px;
        }

        /* CONTAINER */
        .container{
            width:90%;
            margin:auto;
            padding-top:120px;
        }

        /* CARD */
        .card{
            background:rgba(26,18,48,0.7);
            border:1px solid rgba(92,225,230,0.15);
            border-radius:18px;
            backdrop-filter:blur(10px);
        }

        /* BUTTON HOVER FIX */
        .btn:hover{
            transform:translateY(-2px) scale(1.03);
            box-shadow:0 0 25px rgba(92,225,230,0.6);
        }

        /* INPUT STYLE (для login/register) */
        input{
            width:100%;
            padding:14px;
            margin-top:8px;
            margin-bottom:18px;

            border:none;
            border-radius:12px;

            background:#1A1230;
            color:white;

            outline:none;
            border:1px solid rgba(92,225,230,0.2);
            transition:0.3s;
        }

        input:focus{
            border-color:#5CE1E6;
            box-shadow:0 0 15px rgba(92,225,230,0.3);
        }

    </style>
</head>

<body>

<nav class="navbar">

    <a href="/" class="logo">NeuroTech</a>

    <div class="nav-links">

        <a href="/">Главная</a>

        <!-- CATEGORIES -->
        <div class="dropdown">

            <span style="cursor:pointer;">
                Категории ▼
            </span>

            <div class="dropdown-content">

                {% for category in categories %}
                    <a href="{% url 'category_detail' category.slug %}">
                        {{ category.name }}
                    </a>
                {% endfor %}

            </div>

        </div>

        <a href="{% url 'search' %}" class="btn">Поиск</a>

        <a href="/cart/">Корзина</a>

        {% if user.is_authenticated %}

            <a href="/accounts/profile/">

                {% if profile and profile.avatar %}
                    <img src="{{ profile.avatar.url }}" class="nav-avatar">
                {% else %}
                    <div class="avatar-fallback">👤</div>
                {% endif %}

            </a>

        {% else %}

            <a href="/accounts/login/">Вход</a>
            <a href="/accounts/register/">Регистрация</a>

        {% endif %}

    </div>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
