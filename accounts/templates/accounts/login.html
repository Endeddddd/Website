{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:450px;
    margin:auto;
    margin-top:60px;
">

    <div class="card" style="
        padding:40px;
    ">

        <h1 style="
            font-family:Orbitron;
            font-size:36px;
            margin-bottom:30px;
            color:#5CE1E6;
        ">
            Вход в NeuroTech
        </h1>

        <form method="POST">

            {% csrf_token %}

            <label>Логин</label>
            <input type="text" name="username" placeholder="Введите логин">

            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль">

            <button type="submit" class="btn" style="
                width:100%;
                margin-top:10px;
            ">
                Войти
            </button>

        </form>

        <p style="margin-top:20px; text-align:center; opacity:0.7;">
            Нет аккаунта?
            <a href="/accounts/register/" style="color:#5CE1E6;">
                Зарегистрироваться
            </a>
        </p>

    </div>

</div>

{% endblock %}
