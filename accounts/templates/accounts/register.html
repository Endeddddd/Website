{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:450px;
    margin:auto;
    margin-top:60px;
">

    <div class="card" style="padding:40px;">

        <h1 style="
            font-family:Orbitron;
            font-size:36px;
            margin-bottom:30px;
            color:#6C63FF;
        ">
            Регистрация
        </h1>

        <form method="POST">

            {% csrf_token %}

            <label>Логин</label>
            <input type="text" name="username" placeholder="Придумайте логин">

            <label>Email</label>
            <input type="email" name="email" placeholder="Ваш email">

            <label>Пароль</label>
            <input type="password" name="password" placeholder="Придумайте пароль">

            <button type="submit" class="btn" style="
                width:100%;
                margin-top:10px;
            ">
                Создать аккаунт
            </button>

        </form>

        <p style="margin-top:20px; text-align:center; opacity:0.7;">
            Уже есть аккаунт?
            <a href="/accounts/login/" style="color:#5CE1E6;">
                Войти
            </a>
        </p>

    </div>

</div>

{% endblock %}
